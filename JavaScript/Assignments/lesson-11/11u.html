        function skipEgg(array){
           array.reverse();
           let original = array.slice();
            let arr = [];
            let count = 0;
            for(let i = 0; i < array.length; i++){
                    if(array[i] == 'egg' && count < 2){
                        count++;
                        continue;
                    }
                    else{
                        arr.push(array[i]);
                    }
                
            }
            console.log(original);
            return arr.reverse();
        };
        console.log(skipEgg(['apple','search', 'egg','banana', 'guava','egg','egg']));
