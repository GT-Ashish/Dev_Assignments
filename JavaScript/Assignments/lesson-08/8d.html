<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>8d</title>
</head>
<body>
    <script>
        const basketball = {
            name : 'basketball',
            price: 1095
        }
        const football = {
            name : 'football',
            price: 2095
        }
        function comparePrice(product1, product2){
            return product1.price > product2.price ? product2: product1;
        };
        console.log(comparePrice(basketball, football));
    </script>
</body>
</html>
