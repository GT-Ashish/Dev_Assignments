<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>rock-paper-scissors</title>
</head>
<body>
    <p>
        Rock Paper Scissors
    </p>
    <button onclick="playGame('rock')">
        rock
    </button>
    <button onclick="playGame('paper')">
        paper
    </button>
    <button onclick="playGame('scissors')">
        scissors
    </button>
    <p class="result-text"></p>
    <p class="choice-text"></p>
    <p class="score-text"></p>

    <button onclick="
        score.losses = 0; 
        score.wins = 0; 
        score.ties = 0;
        displayScore();
        localStorage.setItem('score'.JSON.stringify(score));
        ">
        Reset Score
    </button>
    <script>
        let score = JSON.parse(localStorage.getItem('score')) ||
        {
            wins : 0,
            losses : 0,
            ties : 0
        };
        const scoreText = document.querySelector('.score-text');
        const resultText = document.querySelector('.result-text');
        const choiceText = document.querySelector('.choice-text');
        function displayScore(){
            scoreText.innerText = `Wins: ${score.wins}, Losses: ${score.losses}, Ties: ${score.ties}`;
        }
        displayScore();

        function displayResult(result){
            resultText.innerText = result;
        }

        function displayMove(playerMove, computerMove){
            choiceText.innerText = `You chose ${playerMove}. Computer chose ${computerMove}`;
        }

        function playGame(playerMove){
            const computerMove = computeMove();
            let result;
            if(playerMove === 'rock'){
                if(computerMove === 'scissors'){
                    result = 'You Win';
                }
                else if(computerMove === 'paper'){
                    result = 'You Lose';
                }
                else{
                    result = 'Tie'
                }
            }
            else if(playerMove === 'paper'){
                if(computerMove === 'scissors'){
                    result = 'You Lose';
                }
                else if(computerMove === 'paper'){
                    result = 'Tie';
                }
                else{
                    result = 'You Win'
                }
            }
            else{
                if(computerMove === 'scissors'){
                    result = 'Tie';
                }
                else if(computerMove === 'paper'){
                    result = 'You Win';
                }
                else{
                    result = 'You Lose'
                }
            }
            displayResult(result);
            updateScore(result);
            displayScore();
            displayMove(playerMove, computerMove);
        }

        function computeMove(){
            const value = Math.random();
            if(value < 1/3){
                return 'rock';
            }
            else if(value < 2/3){
                return 'paper';
            }
            else{
                return 'scissors';
            }
        }

        function updateScore(result){
            if(result === 'You Win'){
                score.wins += 1;
            }
            else if(result === 'You Lose'){
                score.losses += 1;
            }
            else{
                score.ties += 1;
            }
            localStorage.setItem('score', JSON.stringify(score));
        }
    </script>
</body>
</html>
