<body>
    <script>
        const basketball = {
            name : 'basketball',
            price: 1095
        }
        const football = {
            name : 'football',
            price: 2095
        }
        function isSameProduct(product1, product2){
            if(product1.name === product2.name && product1.price === product2.price){
                return true;
            }
            return false;
        }
        console.log(isSameProduct(football, football));
        console.log(isSameProduct(football, basketball));
    </script>
</body>
