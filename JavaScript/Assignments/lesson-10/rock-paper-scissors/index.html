<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>rock-paper-scissors</title>
    <style>
        body{
            font-family: arial;
            color: white;
            background-color: rgb(29, 28, 28);
        }
        .container{
            max-width: 1200px;
            width: 50vw;
            height: 90vh;
            margin: 0 auto;
            text-align: center;
            padding: 1em;
            border: 2px solid white;
        }
        .page-heading{
            font-size: 1.75rem;
            font-weight: bold;
        }

        .result-text{
            font-weight: bold;
            font-size: 1.5rem;
        }

        .reset-button{
            font-size: 1rem;
            padding: .5em 1em;
            border-radius: 0;
            border: none;
        }

        .choice-button img{
            width: 50%;
            height: 50%;
        }

        .choice-button{
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 3px solid white;
            background-color: inherit;
            margin-right: .75em;
        }

        .choice-text img{
            width: 50px;
            height: 50px;
        }
    </style>
</head>
<body>
    <div class="container">
        <p class="page-heading">
            Rock Paper Scissors
        </p>
        <button class="choice-button" onclick="playGame('rock')">
            <img src="../../../assets/assignments/rock-emoji.png" alt="rock-emoji">
        </button>
        <button class="choice-button" onclick="playGame('paper')">
            <img src="../../../assets/assignments/paper-emoji.png" alt="paper-emoji">
        </button>
        <button class="choice-button" onclick="playGame('scissors')">
            <img src="../../../assets/assignments/scissors-emoji.png" alt="scissors-emoji">
        </button>
        <p class="result-text"></p>
        <p class="choice-text"></p>
        <p class="score-text"></p>

        <button onclick="
            score.losses = 0; 
            score.wins = 0; 
            score.ties = 0;
            displayScore();
            localStorage.setItem('score'.JSON.stringify(score));
            " class="reset-button">
            Reset Score
        </button>
    </div>
    <script>
        let computerEmoji;
        let playerEmoji;
        let score = JSON.parse(localStorage.getItem('score')) ||
        {
            wins : 0,
            losses : 0,
            ties : 0
        };
        const scoreText = document.querySelector('.score-text');
        const resultText = document.querySelector('.result-text');
        const choiceText = document.querySelector('.choice-text');
        function displayScore(){
            scoreText.innerText = `Wins: ${score.wins}, Losses: ${score.losses}, Ties: ${score.ties}`;
        }
        displayScore();

        function displayResult(result){
            resultText.innerText = result;
        }

        function displayMove(){
            choiceText.innerHTML = `<span>You</span> <img src ="${playerEmoji}"> <img src ="${computerEmoji}"><span>Computer<span>`;
        }

        function playGame(playerMove){
            const computerMove = computeMove();
            let result;
            if(playerMove === 'rock'){
                playerEmoji = '../../../assets/assignments/rock-emoji.png';
                if(computerMove === 'scissors'){
                    result = 'You Win.';
                }
                else if(computerMove === 'paper'){
                    result = 'You Lose.';
                }
                else{
                    result = 'Tie.'
                }
            }
            else if(playerMove === 'paper'){
                playerEmoji = '../../../assets/assignments/paper-emoji.png'
                if(computerMove === 'scissors'){
                    result = 'You Lose.';
                }
                else if(computerMove === 'paper'){
                    result = 'Tie.';
                }
                else{
                    result = 'You Win.'
                }
            }
            else{
                playerEmoji = '../../../assets/assignments/scissors-emoji.png'
                if(computerMove === 'scissors'){
                    result = 'Tie.';
                }
                else if(computerMove === 'paper'){
                    result = 'You Win.';
                }
                else{
                    result = 'You Lose.'
                }
            }
            displayResult(result);
            updateScore(result);
            displayScore();
            displayMove();
        }

        function computeMove(){
            const value = Math.random();
            if(value < 1/3){
                computerEmoji = '../../../assets/assignments/rock-emoji.png'
                return 'rock';
            }
            else if(value < 2/3){
                computerEmoji = '../../../assets/assignments/paper-emoji.png'
                return 'paper';
            }
            else{
                computerEmoji = '../../../assets/assignments/scissors-emoji.png'
                return 'scissors';
            }
        }

        function updateScore(result){
            if(result === 'You Win.'){
                score.wins += 1;
            }
            else if(result === 'You Lose.'){
                score.losses += 1;
            }
            else{
                score.ties += 1;
            }
            localStorage.setItem('score', JSON.stringify(score));
        }
    </script>
</body>
</html>
