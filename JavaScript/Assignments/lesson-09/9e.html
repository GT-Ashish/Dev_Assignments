<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>9d</title>
</head>
<body>
    <input onkeydown = "isEnter(event)"
    placeholder = "Enter text">
    <button onclick ="displayText()"
    class="submit-button">
        submit
    </button>
    <p></p>
    <script>
        const inputText = document.querySelector('input');
        function displayText(){
            document.querySelector('p').innerText = `Your name is ${inputText.value}`
        }
        function isEnter(event){
            if(event.key === 'Enter'){
                displayText();
            }
        }
    </script>
</body>
</html>
