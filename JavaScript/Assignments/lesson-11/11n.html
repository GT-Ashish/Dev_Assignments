<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>11n</title>
</head>
<body>
    <script>
        function countWords(array){
            const object = {};
            for(let i = 0; i < array.length; i++){
                if(object[array[i]]){
                    object[array[i]] += 1;
                }
                else{
                    object[array[i]] = 1;
                }
            }
            return object;
        };
        console.log(countWords(['apple','apple', 'banana', 'guava']));
    </script>
</body>
</html>
